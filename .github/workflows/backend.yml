name: backend

permissions:
  contents: read
  id-token: write

on:
  push:
    paths:
      - "backend/**"
      - "spec/openapi.yaml"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - "spec/openapi.yaml"
      - ".github/workflows/backend.yml"

concurrency:
  group: production-backend
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: backend
          version: v2.12.2
          skip-cache: true

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::836734448013:role/medvault-github-actions
          aws-region: us-east-1

      - name: Read deployment outputs
        id: tf
        working-directory: infrastructure/terraform/environments/production
        run: |
          terraform init -input=false
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "ecs_cluster_name=$(terraform output -raw ecs_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "ecs_service_name=$(terraform output -raw ecs_service_name)" >> "$GITHUB_OUTPUT"
          echo "api_base_url=$(terraform output -raw api_base_url)" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        env:
          IMAGE_URI: ${{ steps.tf.outputs.ecr_repository_url }}
        run: |
          registry_host="${IMAGE_URI%%/*}"
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin "$registry_host"

      - name: Build image
        env:
          IMAGE_URI: ${{ steps.tf.outputs.ecr_repository_url }}
          IMAGE_TAG: ${{ github.sha }}
          DOCKER_BUILDKIT: "1"
        run: docker build -t "$IMAGE_URI:$IMAGE_TAG" .

      - name: Push image
        env:
          IMAGE_URI: ${{ steps.tf.outputs.ecr_repository_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: docker push "$IMAGE_URI:$IMAGE_TAG"

      - name: Run migrations and deploy
        env:
          IMAGE_URI: ${{ steps.tf.outputs.ecr_repository_url }}
          IMAGE_TAG: ${{ github.sha }}
          CLUSTER_NAME: ${{ steps.tf.outputs.ecs_cluster_name }}
          SERVICE_NAME: ${{ steps.tf.outputs.ecs_service_name }}
          API_BASE_URL: ${{ steps.tf.outputs.api_base_url }}
        run: |
          set -euo pipefail

          service_task_definition=$(aws ecs describe-services --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME" --query 'services[0].taskDefinition' --output text)
          aws ecs describe-task-definition --task-definition "$service_task_definition" --query 'taskDefinition' --output json > task-definition.json

          jq --arg image "$IMAGE_URI:$IMAGE_TAG" '
            .containerDefinitions |= map(if .name == "backend" then .image = $image else . end)
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .deregisteredAt)
          ' task-definition.json > task-definition.new.json

          new_task_definition=$(aws ecs register-task-definition --cli-input-json file://task-definition.new.json --query 'taskDefinition.taskDefinitionArn' --output text)

          network_subnets=$(aws ecs describe-services --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME" --query 'services[0].networkConfiguration.awsvpcConfiguration.subnets' --output json | jq -r 'join(",")')
          network_security_groups=$(aws ecs describe-services --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME" --query 'services[0].networkConfiguration.awsvpcConfiguration.securityGroups' --output json | jq -r 'join(",")')

          task_arn=$(aws ecs run-task \
            --cluster "$CLUSTER_NAME" \
            --launch-type FARGATE \
            --task-definition "$new_task_definition" \
            --count 1 \
            --network-configuration "awsvpcConfiguration={subnets=[$network_subnets],securityGroups=[$network_security_groups],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"backend","command":["migrate","up"]}]}' \
            --query 'tasks[0].taskArn' \
            --output text)

          aws ecs wait tasks-stopped --cluster "$CLUSTER_NAME" --tasks "$task_arn"

          exit_code=$(aws ecs describe-tasks --cluster "$CLUSTER_NAME" --tasks "$task_arn" --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$exit_code" != "0" ]; then
            aws ecs describe-tasks --cluster "$CLUSTER_NAME" --tasks "$task_arn" --query 'tasks[0].containers[0].reason' --output text
            exit 1
          fi

          aws ecs update-service --cluster "$CLUSTER_NAME" --service "$SERVICE_NAME" --task-definition "$new_task_definition" --desired-count 1 >/dev/null
          aws ecs wait services-stable --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME"

          curl --fail --retry 10 --retry-all-errors --retry-delay 5 "$API_BASE_URL/health"
