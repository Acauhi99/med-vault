name: frontend

permissions:
  contents: read
  id-token: write

on:
  push:
    paths:
      - "frontend/**"
      - "spec/openapi.yaml"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "spec/openapi.yaml"
      - ".github/workflows/frontend.yml"

concurrency:
  group: production-frontend
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: web
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::836734448013:role/medvault-github-actions
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Read deployment outputs
        id: tf
        working-directory: infrastructure/terraform/environments/production
        run: |
          terraform init -input=false
          echo "frontend_ecr_repository_url=$(terraform output -raw frontend_ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "ecs_cluster_name=$(terraform output -raw ecs_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "frontend_ecs_service_name=$(terraform output -raw frontend_ecs_service_name)" >> "$GITHUB_OUTPUT"
          echo "api_base_url=$(terraform output -raw api_base_url)" >> "$GITHUB_OUTPUT"
          echo "frontend_base_url=$(terraform output -raw frontend_base_url)" >> "$GITHUB_OUTPUT"

      - name: Build image
        working-directory: .
        env:
          IMAGE_URI: ${{ steps.tf.outputs.frontend_ecr_repository_url }}
          IMAGE_TAG: ${{ github.sha }}-${{ github.run_attempt }}
          API_BASE_URL: ${{ steps.tf.outputs.api_base_url }}
        run: docker build -f frontend/Dockerfile --build-arg NEXT_PUBLIC_API_URL="$API_BASE_URL" -t "$IMAGE_URI:$IMAGE_TAG" frontend

      - name: Login to ECR
        env:
          IMAGE_URI: ${{ steps.tf.outputs.frontend_ecr_repository_url }}
        run: |
          registry_host="${IMAGE_URI%%/*}"
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin "$registry_host"

      - name: Push image
        env:
          IMAGE_URI: ${{ steps.tf.outputs.frontend_ecr_repository_url }}
          IMAGE_TAG: ${{ github.sha }}-${{ github.run_attempt }}
        run: docker push "$IMAGE_URI:$IMAGE_TAG"

      - name: Deploy
        env:
          IMAGE_URI: ${{ steps.tf.outputs.frontend_ecr_repository_url }}
          IMAGE_TAG: ${{ github.sha }}-${{ github.run_attempt }}
          CLUSTER_NAME: ${{ steps.tf.outputs.ecs_cluster_name }}
          SERVICE_NAME: ${{ steps.tf.outputs.frontend_ecs_service_name }}
        run: |
          set -euo pipefail

          service_task_definition=$(aws ecs describe-services --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME" --query 'services[0].taskDefinition' --output text)
          aws ecs describe-task-definition --task-definition "$service_task_definition" --query 'taskDefinition' --output json > task-definition.json

          jq --arg image "$IMAGE_URI:$IMAGE_TAG" '
            .containerDefinitions |= map(if .name == "frontend" then .image = $image else . end)
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .deregisteredAt)
          ' task-definition.json > task-definition.new.json

          new_task_definition=$(aws ecs register-task-definition --cli-input-json file://task-definition.new.json --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service --cluster "$CLUSTER_NAME" --service "$SERVICE_NAME" --task-definition "$new_task_definition" --desired-count 1 >/dev/null
          aws ecs wait services-stable --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME"

      - name: Smoke test
        env:
          FRONTEND_BASE_URL: ${{ steps.tf.outputs.frontend_base_url }}
        run: |
          curl --fail --retry 10 --retry-all-errors --retry-delay 5 "$FRONTEND_BASE_URL/"
          curl --fail --retry 10 --retry-all-errors --retry-delay 5 "$FRONTEND_BASE_URL/cases/"
