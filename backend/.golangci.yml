version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gocritic
    - gofmt
    - goimports
    - misspell
    - unconvert
    - prealloc

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m
  modules-download-mode: readonly
